esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: local.esphome-firmware
    version: "0.1.0"

esp32:
  board: ${board}
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:
