substitutions:
  device_name: esp32-c3-833mhz-smart-remote
  friendly_name: 833 MHz Smart Remote
  board: esp32-c3-devkitm-1

  # Adjust GPIO if your ESP32-C3 board drives the optocoupler on a different pin.
  trigger_gpio: GPIO7

  # Set to true if the optocoupler conducts on LOW instead of HIGH.
  trigger_inverted: "false"

  default_press_duration: "1"
  min_press_duration: "0.2"
  max_press_duration: "15"
  press_duration_step: "0.1"

packages:
  base: !include ../packages/common/device-base.yaml
  telemetry: !include ../packages/common/telemetry.yaml
  momentary_opto_button: !include ../packages/common/momentary-opto-button.yaml
